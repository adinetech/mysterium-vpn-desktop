name: Auto Update Node Binary

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually click a "Run workflow" button in the Actions tab

jobs:
  update-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Run upgrade script
        run: yarn upgrade-node
        
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update node binary to latest release"
          title: "Update Mysterium Node Binary to Latest"
          body: |
            This PR was auto-generated by the **Auto Update Node Binary** workflow. 
            It has successfully detected a new release on `mysteriumnetwork/node` and updated the vendored package.
            
            Review the changes and merge this PR. Once merged, you can tag a new release to trigger the build workflow!
          branch: "auto-update-node"
          base: "master"
          delete-branch: true
